name: Smart Money Pipeline

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 7 AM ET (12 PM UTC) — before market open
    - cron: '30 21 * * 1-5'  # 5:30 PM ET (21:30 UTC) — after market close
  workflow_dispatch:           # allow manual trigger from GitHub UI

# Minimal permissions — read code only, write nothing to the repo
permissions:
  contents: read
  actions: write  # needed for cache read/write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements-lock.txt') }}
          restore-keys: pip-${{ runner.os }}-

      # Install from pinned lockfile — prevents supply chain attacks via
      # unpinned >= versions silently pulling in a compromised package update.
      - name: Install dependencies
        run: pip install -r requirements-lock.txt

      # Restore the SQLite DB from the previous run so dedup works and we
      # don't re-alert on signals already sent to Slack.
      - name: Restore database cache
        uses: actions/cache/restore@v4
        with:
          path: smart_money.db
          key: db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: db-${{ runner.os }}-

      # Secrets are passed directly as env vars — never written to disk or
      # echoed in the workflow log. Pydantic-settings reads env vars before
      # falling back to config/.env, so no .env file is needed here.
      - name: Run pipeline
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DATABASE_URL: sqlite:///./smart_money.db
          CONVICTION_THRESHOLD: "0.6"
          PIPELINE_MODE: oneshot
          LOG_LEVEL: INFO
        run: python -m src.pipeline.orchestrator --mode oneshot

      # Run unit tests after the pipeline so a green workflow guarantees
      # both that the day's run succeeded AND the test suite still passes.
      - name: Run unit tests
        run: python -m pytest tests/ -q --no-header

      # Performance gate: fail the build if Sharpe < SHARPE_FLOOR or IC < IC_FLOOR.
      # Reads from the live DB if it has return_20d-labeled records; otherwise
      # falls back to tests/fixtures/synthetic_signals.json so the gate
      # operates from day one. Tune floors via repo variables.
      - name: Performance gate (Sharpe / IC)
        env:
          DATABASE_URL: sqlite:///./smart_money.db
          SHARPE_FLOOR: ${{ vars.SHARPE_FLOOR || '0.5' }}
          IC_FLOOR: ${{ vars.IC_FLOOR || '0.03' }}
        run: python scripts/validate_performance.py

      # Persist the DB after each run so the next run picks up where this left off.
      - name: Save database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: smart_money.db
          key: db-${{ runner.os }}-${{ github.run_id }}
